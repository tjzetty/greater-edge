<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Greater Edge Landscaping | Family Owned & Operated</title>
    <meta name="description" content="Professional landscaping services. Family owned and operated. Free estimates available." />
    <link rel="icon" type="image/x-icon" href="/images/logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; padding: 0; background: #0f172a; font-family: 'Inter', sans-serif; }
      /* Hide only the old theme's wrapper if it appears */
      .is-preload, #page-wrapper { display: none !important; }
    </style>
    <!-- Simple removal of duplicate header (safe, doesn't touch app) -->
    <script>
      (function() {
        function removeDuplicate() {
          var old = document.querySelectorAll('.is-preload, #page-wrapper');
          old.forEach(function(el) { if (el && el.parentNode) el.parentNode.removeChild(el); });
        }
        if (document.body) removeDuplicate();
        document.addEventListener('DOMContentLoaded', removeDuplicate);
      })();
    </script>
  </head>
  <body style="margin:0; padding:0; background:#0f172a;">
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
